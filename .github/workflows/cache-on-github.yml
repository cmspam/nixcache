          echo "Paths to upload: $(wc -l < /tmp/local-paths.txt)"
          cat /tmp/local-paths.txt

      - name: Export local paths to NAR cache format
        run: |
          mkdir -p /tmp/cache

          if [ -s /tmp/local-paths.txt ]; then
            xargs nix copy \
