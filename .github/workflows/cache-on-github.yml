            https://jovian-experiments.cachix.org
            https://cmspam.cachix.org
            https://lanzaboote.cachix.org
            https://nix-community.cachix.org
            https://cuda-maintainers.cachix.org
          )

          echo "Getting full closure..."
          nix path-info --recursive .#gamepc-system > /tmp/all-paths.txt
          echo "Total paths in closure: $(wc -l < /tmp/all-paths.txt)"

          > /tmp/cached-paths.txt
          for substituter in "${SUBSTITUTERS[@]}"; do
