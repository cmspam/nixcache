          EOF

          echo "Files to upload: $(ls /tmp/cache | wc -l)"

      - name: Upload to GitHub Release
        if: hashFiles('/tmp/local-paths.txt') != ''
        run: |
          gh release create gamepc-nix-cache \
            --title "Nix Cache: gamepc" \
            --notes "Auto-generated Nix binary cache for the gamepc system closure. Do not edit manually." \
            2>/dev/null || true

          gh release upload gamepc-nix-cache /tmp/cache/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
